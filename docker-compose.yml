services:
  mircrew-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mircrew-proxy
    environment:
      - MIRCREW_USERNAME=${MIRCREW_USERNAME}
      - MIRCREW_PASSWORD=${MIRCREW_PASSWORD}
      - MIRCREW_URL=${MIRCREW_URL:-https://mircrew-releases.org}
      - MIRCREW_API_KEY=${MIRCREW_API_KEY:-mircrew-api-key}
      - PROXY_HOST=0.0.0.0
      - PROXY_PORT=9696
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # CF cookies: optional manual override (JSON string from Cookie Editor)
      - CF_COOKIES=${CF_COOKIES:-}
    ports:
      - "9696:9696"
    volumes:
      - ./data:/app/data
    # Shared memory for Chromium
    shm_size: "256m"
    command: python src/proxy_server.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/health"]
      interval: 30s
      timeout: 10s
      retries: 3
