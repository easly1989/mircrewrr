services:
  # Servizio principale: Proxy server per Prowlarr
  # Per usare una porta diversa, cambiare PROXY_PORT qui sotto E nei ports mapping
  mircrew-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mircrew-proxy
    environment:
      - MIRCREW_USERNAME=${MIRCREW_USERNAME:-}
      - MIRCREW_PASSWORD=${MIRCREW_PASSWORD:-}
      - MIRCREW_URL=${MIRCREW_URL:-https://mircrew-releases.org}
      - MIRCREW_API_KEY=${MIRCREW_API_KEY:-mircrew-api-key}
      - PROXY_HOST=0.0.0.0
      - PROXY_PORT=${PROXY_PORT:-9696}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${PROXY_PORT:-9696}:${PROXY_PORT:-9696}"
    volumes:
      - ./data:/app/data
    shm_size: '256m'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${PROXY_PORT:-9696}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
