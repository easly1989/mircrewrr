services:
  mircrew-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mircrew-proxy
    environment:
      - MIRCREW_USERNAME=${MIRCREW_USERNAME}
      - MIRCREW_PASSWORD=${MIRCREW_PASSWORD}
      - MIRCREW_URL=${MIRCREW_URL:-https://mircrew-releases.org}
      - MIRCREW_API_KEY=${MIRCREW_API_KEY:-mircrew-api-key}
      - PROXY_HOST=0.0.0.0
      - PROXY_PORT=9696
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # CF cookies: JSON string from browser Cookie Editor export
      # Or use POST /cookies endpoint at runtime
      - CF_COOKIES=${CF_COOKIES:-}
      # Must match the browser UA that generated the CF cookies
      - CF_USER_AGENT=${CF_USER_AGENT:-Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/134.0.0.0 Safari/537.36}
    ports:
      - "9696:9696"
    volumes:
      - ./data:/app/data
    command: python src/proxy_server.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/health"]
      interval: 30s
      timeout: 10s
      retries: 3
